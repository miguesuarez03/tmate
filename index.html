<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow" />
    <title>TMate — Descubre tu próxima ciudad</title>
    <meta name="description" content="Tu plataforma para Erasmus, Work & Travel, internships y experiencias internacionales. Descubre ciudades, compara costes y encuentra tu próxima aventura." />

    <!-- Open Graph / Twitter Card — valores por defecto, cada página los
         sobrescribe dinámicamente vía el hook useSEO -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TMate" />
    <meta name="twitter:card" content="summary" />

    <!-- Google Fonts: preconnect + link (más rápido que @import en CSS) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;0,800;0,900;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { -webkit-font-smoothing: antialiased; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
